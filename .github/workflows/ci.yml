name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-package-lock --include=optional

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package.json') }}-${{ github.sha }}

  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: install

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package.json') }}-${{ github.sha }}

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: install

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package.json') }}-${{ github.sha }}

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run tests
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package.json') }}-${{ github.sha }}

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build application
        run: npm run build

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          envs: DATABASE_URL,JWT_SECRET,REDIS_URL,RESEND_API_KEY,AWS_REGION,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_S3_BUCKET,NEXT_PUBLIC_APP_URL
          script: |
            if [ ! -d ~/task-app ]; then
              echo "==> Cloning repository..."
              git clone https://github.com/Bax-dev/task-app.git ~/task-app
            fi

            cd ~/task-app

            echo "==> Writing .env file..."
            echo "DATABASE_URL=\"${DATABASE_URL}\"" > .env
            echo "JWT_SECRET=\"${JWT_SECRET}\"" >> .env
            echo "REDIS_URL=\"${REDIS_URL}\"" >> .env
            echo "RESEND_API_KEY=\"${RESEND_API_KEY}\"" >> .env
            echo "AWS_REGION=\"${AWS_REGION}\"" >> .env
            echo "AWS_ACCESS_KEY_ID=\"${AWS_ACCESS_KEY_ID}\"" >> .env
            echo "AWS_SECRET_ACCESS_KEY=\"${AWS_SECRET_ACCESS_KEY}\"" >> .env
            echo "AWS_S3_BUCKET=\"${AWS_S3_BUCKET}\"" >> .env
            echo "NEXT_PUBLIC_APP_URL=\"${NEXT_PUBLIC_APP_URL}\"" >> .env
            echo "NODE_ENV=\"production\"" >> .env

            echo "==> Sourcing .env file..."
            set -a
            source .env
            set +a

            if [ -z "$DATABASE_URL" ]; then
              echo "ERROR: DATABASE_URL is not set. Please configure it in GitHub Secrets."
              exit 1
            fi

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Installing dependencies..."
            npm ci

            echo "==> Generating Prisma client..."
            npx prisma generate

            echo "==> Running database migrations..."
            npx prisma migrate deploy

            echo "==> Building application..."
            npm run build

            echo "==> Reloading with zero downtime..."
            pm2 reload ecosystem.config.js --update-env

            echo "==> Saving PM2 process list..."
            pm2 save

            echo "==> Deploy complete!"
